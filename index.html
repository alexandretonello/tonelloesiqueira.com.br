<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tonello & Siqueira — Valuation para PME</title>
<meta name="description" content="Boutique brasileira de valuation, M&A advisory e planejamento sucessório para pequenas e médias empresas." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Inter+Tight:wght@300;400;500&family=Manrope:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* Tonello & Siqueira — Valuation boutique landing
   System: navy + warm cream + bronze accent
   Type: Instrument Serif (display) + Geist (body) + Geist Mono (numerals/labels)
*/

:root {
  --navy: #0E1A2B;
  --navy-2: #16263D;
  --cream: #F4EFE6;
  --cream-2: #EBE4D6;
  --paper: #FAF7F1;
  --bronze: #B08862;
  --bronze-2: #C9A07A;
  --ink: #14202F;
  --mute: #5C6470;
  --line: rgba(20, 32, 47, 0.12);
  --line-strong: rgba(20, 32, 47, 0.22);
  --line-dark: rgba(244, 239, 230, 0.16);

  --font-display: "Instrument Serif", "Cormorant Garamond", "Times New Roman", serif;
  --font-body: "Geist", "Inter", system-ui, -apple-system, sans-serif;
  --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;

  --container: 1200px;
  --pad: clamp(20px, 4vw, 64px);
}

/* ── reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img, svg { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* ── layout primitives ──────────────────────────────────── */
.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 var(--pad);
}
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--bronze);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.eyebrow::before {
  content: "";
  width: 18px; height: 1px;
  background: var(--bronze);
}
.eyebrow.on-dark { color: var(--bronze-2); }
.eyebrow.on-dark::before { background: var(--bronze-2); }

.h-display {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(40px, 6.4vw, 88px);
  line-height: 1.02;
  letter-spacing: -0.015em;
  margin: 0;
}
.h-display i { font-style: italic; color: var(--bronze); }
.h-section {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(32px, 4vw, 54px);
  line-height: 1.05;
  letter-spacing: -0.01em;
  margin: 0;
}
.h-section i { font-style: italic; color: var(--bronze); }

.lead {
  font-size: clamp(16px, 1.3vw, 19px);
  line-height: 1.55;
  color: var(--mute);
  max-width: 56ch;
}

/* ── nav ───────────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(250, 247, 241, 0.78);
  backdrop-filter: saturate(160%) blur(14px);
  -webkit-backdrop-filter: saturate(160%) blur(14px);
  border-bottom: 1px solid var(--line);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 72px;
}
.wordmark {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 0.01em;
  display: inline-flex; align-items: baseline; gap: 6px;
}
.wordmark .amp { font-style: italic; color: var(--bronze); }
.wordmark .sub {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mute);
  margin-left: 10px;
  align-self: center;
}
.nav-links { display: flex; gap: 30px; }
.nav-links a {
  font-size: 14px; color: var(--ink);
  position: relative;
}
.nav-links a:hover { color: var(--bronze); }

.btn {
  --bg: var(--navy);
  --fg: var(--paper);
  display: inline-flex; align-items: center; gap: 10px;
  padding: 12px 20px;
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--bg);
  border-radius: 999px;
  font-size: 14px;
  letter-spacing: 0.005em;
  transition: transform .2s, background .2s, color .2s;
}
.btn:hover { transform: translateY(-1px); background: var(--navy-2); }
.btn .arr { transition: transform .2s; }
.btn:hover .arr { transform: translate(2px, -2px); }
.btn.ghost {
  --bg: transparent; --fg: var(--ink);
  border-color: var(--line-strong);
}
.btn.ghost:hover { background: rgba(20,32,47,.04); }
.btn.bronze {
  --bg: var(--bronze); --fg: white;
  border-color: var(--bronze);
}
.btn.bronze:hover { background: #9c7752; }

/* ── hero ──────────────────────────────────────────────── */
.hero {
  padding: clamp(60px, 9vw, 120px) 0 clamp(50px, 7vw, 90px);
  background:
    radial-gradient(ellipse 60% 70% at 100% 0%, rgba(176,136,98,.08), transparent 60%),
    var(--paper);
  border-bottom: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: clamp(40px, 6vw, 80px);
  align-items: center;
}
.hero-eyebrow-row {
  display: flex; gap: 18px; align-items: center;
  margin-bottom: 28px;
}
.hero-title { margin-bottom: 24px; }
.hero-sub { margin-bottom: 36px; }
.hero-ctas {
  display: flex; gap: 14px; flex-wrap: wrap;
  margin-bottom: 48px;
}
.hero-meta {
  display: flex; gap: 28px;
  padding-top: 28px;
  border-top: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--mute);
}
.hero-meta b {
  display: block;
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  font-size: 30px;
  color: var(--ink);
  letter-spacing: 0;
  margin-bottom: 2px;
  text-transform: none;
}

/* ── valuation card (calculadora) ──────────────────────── */
.calc {
  background: white;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 28px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.6) inset,
    0 30px 60px -30px rgba(14,26,43,.18),
    0 8px 24px -12px rgba(14,26,43,.08);
  position: relative;
}
.calc::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, var(--bronze) 0, var(--bronze) 4px, transparent 4px);
  border-radius: 4px 4px 0 0;
}
.calc-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 22px;
}
.calc-title {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: -0.01em;
}
.calc-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--mute);
}
.calc-field { margin-bottom: 18px; }
.calc-field label {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--mute);
  margin-bottom: 8px;
}
.calc-field label .val {
  font-family: var(--font-mono);
  color: var(--ink);
  font-size: 12px;
  letter-spacing: 0.04em;
}
.calc-field input[type="range"] {
  width: 100%;
  -webkit-appearance: none; appearance: none;
  background: transparent;
  height: 18px;
  margin: 0;
}
.calc-field input[type="range"]::-webkit-slider-runnable-track {
  height: 2px;
  background: linear-gradient(to right,
    var(--navy) 0, var(--navy) var(--pct, 50%),
    var(--line-strong) var(--pct, 50%), var(--line-strong) 100%);
}
.calc-field input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px;
  background: var(--bronze);
  border-radius: 50%;
  border: 2px solid white;
  box-shadow: 0 0 0 1px var(--bronze);
  margin-top: -6px;
}
.calc-field input[type="range"]::-moz-range-track {
  height: 2px; background: var(--line-strong);
}
.calc-field input[type="range"]::-moz-range-thumb {
  width: 12px; height: 12px;
  background: var(--bronze);
  border: 2px solid white;
  border-radius: 50%;
  box-shadow: 0 0 0 1px var(--bronze);
}

.calc-segments {
  display: grid; grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--line);
  border-radius: 2px;
  overflow: hidden;
}
.calc-segments button {
  background: transparent;
  border: 0;
  padding: 10px 8px;
  font-size: 12.5px;
  color: var(--mute);
  border-right: 1px solid var(--line);
  transition: background .15s, color .15s;
}
.calc-segments button:last-child { border-right: 0; }
.calc-segments button:hover { background: rgba(176,136,98,.06); color: var(--ink); }
.calc-segments button.active {
  background: var(--navy); color: var(--paper);
}

.calc-result {
  margin-top: 26px;
  padding-top: 22px;
  border-top: 1px dashed var(--line-strong);
}
.calc-result-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--mute);
  margin-bottom: 6px;
}
.calc-result-range {
  font-family: var(--font-display);
  font-size: 34px;
  line-height: 1.1;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.calc-result-range .sep { color: var(--bronze); margin: 0 8px; font-style: italic; }
.calc-result-foot {
  font-size: 12px;
  color: var(--mute);
  margin-top: 10px;
  line-height: 1.5;
}
.calc-cta {
  margin-top: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}
.calc-cta-text {
  font-size: 12.5px;
  color: var(--mute);
  max-width: 24ch;
}

/* ── stats strip ──────────────────────────────────────── */
.stats {
  background: var(--navy);
  color: var(--paper);
  padding: 60px 0;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
}
.stat-num {
  font-family: var(--font-display);
  font-size: clamp(44px, 5vw, 64px);
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--bronze-2);
  margin-bottom: 10px;
}
.stat-num .unit {
  font-size: 0.5em;
  color: var(--cream);
  margin-left: 4px;
  font-style: italic;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(244,239,230,.7);
}

/* ── section base ─────────────────────────────────────── */
.section {
  padding: clamp(70px, 9vw, 130px) 0;
  border-bottom: 1px solid var(--line);
}
.section.alt { background: var(--cream); }
.section.dark { background: var(--navy); color: var(--paper); border-bottom: 0; }
.section.dark .lead { color: rgba(244,239,230,.7); }
.section.dark .h-section i { color: var(--bronze-2); }

.section-head {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 60px;
  align-items: end;
  margin-bottom: 70px;
}
.section-head .lead { margin-top: 0; }

/* ── services ─────────────────────────────────────────── */
.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
}
.svc {
  padding: 36px 32px 40px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  position: relative;
  background: var(--paper);
  transition: background .2s;
}
.section.alt .svc { background: var(--cream); }
.svc:hover { background: white; }
.section.alt .svc:hover { background: var(--paper); }

.svc-num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--bronze);
  margin-bottom: 22px;
}
.svc-title {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: -0.01em;
  line-height: 1.15;
  margin: 0 0 14px;
}
.svc-desc {
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--mute);
  margin: 0 0 22px;
}
.svc-tags {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.svc-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 8px;
  border: 1px solid var(--line-strong);
  color: var(--mute);
  border-radius: 2px;
}

/* ── process / como funciona ──────────────────────────── */
.process-list {
  display: grid;
  gap: 0;
  border-top: 1px solid var(--line-dark);
}
.process-row {
  display: grid;
  grid-template-columns: 80px 1fr 1fr 200px;
  gap: 40px;
  padding: 36px 0;
  border-bottom: 1px solid var(--line-dark);
  align-items: start;
  transition: padding-left .2s;
}
.process-row:hover { padding-left: 12px; }
.process-num {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  color: var(--bronze-2);
  padding-top: 6px;
}
.process-title {
  font-family: var(--font-display);
  font-size: 30px;
  line-height: 1.1;
  letter-spacing: -0.01em;
  margin: 0;
}
.process-desc {
  font-size: 14.5px;
  color: rgba(244,239,230,.7);
  line-height: 1.55;
}
.process-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: rgba(244,239,230,.55);
  text-align: right;
  padding-top: 6px;
}

/* ── about / partners ─────────────────────────────────── */
.partners {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}
.partner {
  display: grid;
  grid-template-rows: auto auto;
}
.partner-photo {
  aspect-ratio: 4/5;
  background: var(--cream-2);
  position: relative;
  overflow: hidden;
  margin-bottom: 24px;
}
.partner-photo svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.partner-photo .photo-label {
  position: absolute;
  bottom: 14px; left: 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mute);
  background: rgba(250,247,241,.92);
  padding: 4px 8px;
  border-radius: 2px;
}
.partner-name {
  font-family: var(--font-display);
  font-size: 36px;
  letter-spacing: -0.01em;
  margin: 0 0 4px;
}
.partner-role {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--bronze);
  margin-bottom: 18px;
}
.partner-bio {
  font-size: 14.5px;
  line-height: 1.6;
  color: var(--mute);
  margin: 0 0 18px;
}
.partner-creds {
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-top: 1px solid var(--line);
  padding-top: 16px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--mute);
}
.partner-creds span::before {
  content: "—";
  margin-right: 10px;
  color: var(--bronze);
}

/* ── sectors ─────────────────────────────────────────── */
.sectors-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
}
.sector {
  padding: 26px 22px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 18px;
  min-height: 140px;
  background: var(--paper);
  transition: background .2s;
}
.section.alt .sector { background: var(--cream); }
.sector:hover { background: white; }
.section.alt .sector:hover { background: var(--paper); }

.sector-name {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: -0.005em;
  line-height: 1.1;
}
.sector-count {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mute);
}
.sector-count b { color: var(--bronze); font-weight: 400; }

/* ── faq ─────────────────────────────────────────────── */
.faq-list {
  border-top: 1px solid var(--line);
}
.faq-item {
  border-bottom: 1px solid var(--line);
}
.faq-q {
  width: 100%;
  text-align: left;
  background: transparent;
  border: 0;
  padding: 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  font-family: var(--font-display);
  font-size: clamp(20px, 2vw, 26px);
  letter-spacing: -0.005em;
  line-height: 1.2;
  color: var(--ink);
}
.faq-q .plus {
  width: 28px; height: 28px;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative;
  transition: background .2s, border-color .2s, transform .25s;
}
.faq-q .plus::before, .faq-q .plus::after {
  content: ""; position: absolute;
  background: var(--ink);
}
.faq-q .plus::before { width: 12px; height: 1px; }
.faq-q .plus::after  { width: 1px; height: 12px; transition: transform .25s; }
.faq-item.open .faq-q .plus {
  background: var(--bronze);
  border-color: var(--bronze);
}
.faq-item.open .faq-q .plus::before,
.faq-item.open .faq-q .plus::after { background: white; }
.faq-item.open .faq-q .plus::after { transform: rotate(90deg); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease, padding .25s;
  font-size: 15px;
  line-height: 1.65;
  color: var(--mute);
  max-width: 64ch;
}
.faq-item.open .faq-a {
  max-height: 400px;
  padding: 0 0 28px;
}

/* ── contato ─────────────────────────────────────────── */
.contact {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  gap: 80px;
  align-items: start;
}
.contact-info .h-section { margin-bottom: 28px; }
.contact-channels {
  display: flex; flex-direction: column; gap: 22px;
  margin-top: 36px;
  border-top: 1px solid var(--line);
  padding-top: 28px;
}
.contact-channel {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 24px;
  align-items: baseline;
  font-size: 15px;
}
.contact-channel .lbl {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mute);
}
.contact-channel .val { color: var(--ink); }

.form {
  background: white;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 36px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
  position: relative;
}
.form::before {
  content: "";
  position: absolute; inset: 0 0 auto 0;
  height: 3px;
  background: var(--bronze);
}
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field.wide { grid-column: 1 / -1; }
.form-field label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--mute);
}
.form-field input, .form-field select, .form-field textarea {
  font: inherit;
  padding: 12px 0;
  border: 0;
  border-bottom: 1px solid var(--line-strong);
  background: transparent;
  color: var(--ink);
  width: 100%;
  outline: none;
  transition: border-color .15s;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--bronze);
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {

  TweakText, TweakNumber, TweakColor, TweakButton,
});

// tiny color helpers (hex only)
function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
function hexToRgb(h) {
  const m = h.replace("#", "");
  return [parseInt(m.slice(0,2),16), parseInt(m.slice(2,4),16), parseInt(m.slice(4,6),16)];
}
function rgbToHex(r,g,b) {
  return "#" + [r,g,b].map(v => clamp(Math.round(v),0,255).toString(16).padStart(2,"0")).join("");
}
function lighten(h, amt) {
  const [r,g,b] = hexToRgb(h);
  return rgbToHex(r + (255-r)*amt, g + (255-g)*amt, b + (255-b)*amt);
}
function darken(h, amt) {
  const [r,g,b] = hexToRgb(h);
  return rgbToHex(r*(1-amt), g*(1-amt), b*(1-amt));
}
